<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Помощник студента ВГУ</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="/css/style.css?v=9">
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div id="app">
  <div class="page" id="page-home"></div>
  <div class="page" id="page-schedule"></div>
  <div class="page" id="page-brs"></div>
  <div class="page" id="page-calc"></div>
  <div class="page" id="page-profile"></div>
</div>

<nav class="bottom-nav">
  <button class="nav-item" id="nav-home" onclick="goTo('home')">
    <div class="nav-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
    </div>
    Сегодня
  </button>
  <button class="nav-item" id="nav-schedule" onclick="goTo('schedule')">
    <div class="nav-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
    </div>
    Расписание
  </button>
  <button class="nav-item" id="nav-brs" onclick="goTo('brs')">
    <div class="nav-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    Оценки
  </button>
  <button class="nav-item" id="nav-calc" onclick="goTo('calc')">
    <div class="nav-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="2" width="16" height="20" rx="2"/>
        <line x1="8" y1="6" x2="16" y2="6"/>
        <line x1="8" y1="10" x2="16" y2="10"/>
        <line x1="8" y1="14" x2="12" y2="14"/>
      </svg>
    </div>
    Калькулятор
  </button>
  <button class="nav-item" id="nav-profile" onclick="goTo('profile')">
    <div class="nav-icon-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    Профиль
  </button>
</nav>

<script src="/js/app.js?v=8"></script>
</body>
</html>
